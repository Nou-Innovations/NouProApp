<!DOCTYPE html>
<html>
<head>
    <title>Generate Assets</title>
</head>
<body>
    <canvas id="icon" width="1024" height="1024" style="display: none;"></canvas>
    <canvas id="splash" width="2048" height="2048" style="display: none;"></canvas>
    <script>
        // Generate icon
        const iconCanvas = document.getElementById('icon');
        const iconCtx = iconCanvas.getContext('2d');
        
        iconCtx.fillStyle = '#ffffff';
        iconCtx.fillRect(0, 0, 1024, 1024);
        
        iconCtx.fillStyle = '#000000';
        iconCtx.font = '72px Arial';
        iconCtx.textAlign = 'center';
        iconCtx.textBaseline = 'middle';
        iconCtx.fillText('NouPro', 512, 512);
        
        // Generate splash screen
        const splashCanvas = document.getElementById('splash');
        const splashCtx = splashCanvas.getContext('2d');
        
        splashCtx.fillStyle = '#ffffff';
        splashCtx.fillRect(0, 0, 2048, 2048);
        
        splashCtx.fillStyle = '#000000';
        splashCtx.font = '144px Arial';
        splashCtx.textAlign = 'center';
        splashCtx.textBaseline = 'middle';
        splashCtx.fillText('NouPro', 1024, 1024);
        
        // Download images
        function downloadImage(canvas, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL();
            link.click();
        }
        
        downloadImage(iconCanvas, 'icon.png');
        setTimeout(() => downloadImage(iconCanvas, 'adaptive-icon.png'), 100);
        setTimeout(() => downloadImage(splashCanvas, 'splash.png'), 200);
    </script>
</body>
</html>
