name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      # Crash guard: enforce the existing preflight (scripts/preflight.js) in CI. It
      # runs tsc and fails ONLY on TS2304 "Cannot find name" — a symbol used but never
      # imported. Hermes throws these at runtime; they've shipped real crashes before
      # (bare `ScrollView`, `center`, `useNotifications`). Previously preflight was only
      # run manually; now every push/PR gates on it. The full `tsc --noEmit` gate stays
      # deferred until the 156 type-mismatch errors clear.
      - run: npm run preflight

  backend-tests:
    name: Backend smoke tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Dummy values: the smoke tests exercise pure state-machine logic and never
      # open a connection, but PrismaClient needs a datasource URL to construct.
      DATABASE_URL: postgresql://test:test@localhost:5432/noupro_test
      DIRECT_URL: postgresql://test:test@localhost:5432/noupro_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate --schema ./prisma/schema.prisma
      - run: npm test

# `npm run lint` gates on errors only (currently 0). There is a backlog of warnings
# (unused vars, explicit any, duplicate imports) being burned down — not enforced yet.
# The FULL `tsc --noEmit` gate is still deferred until the ~156-error type-mismatch
# backlog clears — but the `npm run preflight` step above already gates the runtime-crash
# subset (TS2304, "Cannot find name"), which is the class that has actually shipped
# user-visible crashes. That subset is currently zero, so the guard is green.
